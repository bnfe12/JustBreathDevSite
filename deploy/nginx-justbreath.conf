# ──────────────────────────────────────────────────────────────────────────────
# justbreath.life — nginx production config
# Setup: symlink to /etc/nginx/sites-enabled/, then `nginx -t && nginx -s reload`
#
# Features:
#   - Proxy to Node on 127.0.0.1:8080
#   - SSE endpoint (/api/events) with disabled buffering & long timeouts
#   - Large file uploads (10 MB) — matches server limit
#   - Static /media and /public caching
#   - Rate-limit zones for /api/auth/* (defense in depth — server has its own)
#   - HTTP → HTTPS redirect (certbot will manage this after first cert)
#   - Security headers
# ──────────────────────────────────────────────────────────────────────────────

# Rate-limit zones (must be in http{} — usually in nginx.conf, but safe here too)
limit_req_zone $binary_remote_addr zone=jb_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=jb_api:10m  rate=120r/m;

server {
    listen 80;
    listen [::]:80;
    server_name justbreath.life www.justbreath.life;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else — redirect to HTTPS (after certbot runs)
    # Comment out until first cert is obtained:
    # return 301 https://$host$request_uri;

    # Before cert: proxy directly
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

